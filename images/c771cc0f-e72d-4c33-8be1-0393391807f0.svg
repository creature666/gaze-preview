<svg role="presentation" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 16" height="16" width="38"><rect class="tooltip-horizontal-scroll-icon_circle" x="22" y="0" width="16" height="16" rx="8" fill="rgba(255,255,255,0.2)"></rect><style>.tooltip-horizontal-scroll-icon_circle {animation: tooltip-horizontal-scroll-icon_anim-scroll-circle 2.9s infinite linear;}@keyframes tooltip-horizontal-scroll-icon_anim-scroll-circle {0% { opacity: 1;transform: translateX(0);width: 16px;animation-timing-function: ease-in-out; }27% { opacity: 1;transform: translateX(-20px);width: 21px;animation-timing-function: ease-out; }37% { opacity: 1;transform: translateX(-22px);width: 16px;animation-timing-function: ease-in-out; }54% { opacity: 0;transform: translateX(-22px);width: 16px;animation-timing-function: ease-in-out; }100% { opacity: 0;transform: translateX(-22px);width: 16px; }}</style></svg>