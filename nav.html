<!-- Navigation Template (loaded via fetch) -->
<style>
  /* NAV STYLES */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 48px; height: 71px;
    background: rgba(23, 23, 23, 0.75);
    backdrop-filter: blur(9px);
    -webkit-backdrop-filter: blur(9px);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.15),
      inset 0 -1px 0 rgba(255, 255, 255, 0.08),
      inset 0 0 20px rgba(200, 150, 255, 0.08),
      0 8px 16px rgba(0, 0, 0, 0.2);
  }

  .nav-logo {
    position: absolute;
    left: 48px;
  }

  .nav-logo img {
    height: 44px;
    display: block;
    filter: invert(1);
  }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
    margin: 0; padding: 0;
  }

  .nav-links a {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: white;
    text-decoration: none;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .nav-links a:hover,
  .nav-links a.active { opacity: 1; }

  /* Desktop: search + cart icons */
  .nav-desktop-right {
    position: absolute;
    right: 48px;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .nav-search,
  .nav-cart {
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .nav-search:hover,
  .nav-cart:hover { opacity: 1; }

  .nav-search svg,
  .nav-cart svg {
    width: 20px;
    height: 20px;
  }

  /* Mobile right (hamburger + icons) — hidden on desktop */
  .nav-mobile-right { display: none; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 4px;
    justify-content: center;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s;
    width: 20px;
    height: 20px;
  }

  .hamburger:hover { opacity: 1; }
  .hamburger span { width: 20px; height: 1.5px; background: white; display: block; }

  /* Mobile menu */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 71px;
    left: 0; right: 0;
    width: 100%;
    background: rgba(23, 23, 23, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-direction: column;
    padding: 20px 48px;
    z-index: 150;
    list-style: none;
    margin: 0;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .mobile-menu.active {
    display: flex;
    max-height: 100vh;
    opacity: 1;
  }

  .mobile-menu li { list-style: none; }

  .mobile-menu a {
    display: block;
    padding: 12px 0;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.6);
    text-decoration: none;
    transition: color 0.2s;
  }

  .mobile-menu a:hover,
  .mobile-menu a.active { color: white; }

  /* Mobile (≤768px) */
  @media (max-width: 768px) {
    nav { padding: 12px 20px; justify-content: space-between; }
    .nav-logo { position: static; }
    .nav-logo img { height: 16px !important; }
    .nav-links:not(.mobile-menu) { display: none; }
    .nav-desktop-right { display: none; }
    .nav-mobile-right {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .nav-search,
    .nav-cart {
      display: flex;
      width: 20px;
      height: 20px;
    }
    .hamburger { display: flex; }
  }
</style>
